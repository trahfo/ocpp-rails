name: Push gem to RubyGems

# Publishes ocpp-rails to https://rubygems.org via OIDC trusted publishing.
# No API keys are stored: RubyGems mints a short-lived token for this exact
# repository + workflow at push time. See RELEASING.md for the one-time setup.
#
# Trigger: push a version tag, e.g.
#   git tag v0.2.3 && git push origin v0.2.3

on:
  push:
    tags:
      - "v*"

jobs:
  push:
    runs-on: ubuntu-latest

    # id-token: write is required for OIDC trusted publishing.
    # contents: write lets `gh release create` below publish a GitHub Release.
    permissions:
      contents: write
      id-token: write

    # Must match the environment name registered on rubygems.org.
    environment: release

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          ruby-version: .ruby-version

      - name: Build + push gem
        uses: rubygems/release-gem@v1

      # rubygems/release-gem only builds+pushes the gem and tags the release
      # commit; it does not create a GitHub Release. Do that here, using the
      # matching section of CHANGELOG.md as the release notes when present.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes="$(awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)"

          if [ -n "$(echo "$notes" | tr -d '[:space:]')" ]; then
            echo "$notes" > release-notes.md
            gh release create "$GITHUB_REF_NAME" pkg/*.gem \
              --title "$GITHUB_REF_NAME" \
              --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" pkg/*.gem \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
